name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Prepare site directory
        run: |
          rm -rf site
          mkdir -p site

          # Copia i file top-level statici (html/css/js/txt/xml/ico/png)
          cp -v -- *.html *.css *.js *.txt *.xml *.ico *.png site 2>/dev/null || true

          # Copia intere directory (preserva la struttura, es. site/assets/...)
          for d in assets static public dist build; do
            if [ -d "$d" ]; then
              mkdir -p "site/$d"
              cp -R "$d"/* "site/$d"/ || true
            fi
          done

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3.9.3
        with:
          publish_dir: ./site
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
