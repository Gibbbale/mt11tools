<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Calcolatore Rating Calciatore</title>
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="consent-banner.css">
</head>
<body>

<nav class="navigazione">
    <a class="pulsante secondario" href="index.html">Home</a>
</nav>

<h2>Calcolatore Rating</h2>

<p class="intro-valori">Aggiungi i valori del tuo giocatore che vedi nell'app</p>

<div class="gestione-giocatori">
    <div class="campo-giocatore">
        <label for="nome-giocatore">Nome giocatore:</label>
        <input type="text" id="nome-giocatore" placeholder="Es. gibbale">
    </div>

    <div class="campo-giocatore">
        <label for="giocatori-salvati">Giocatori salvati:</label>
        <select id="giocatori-salvati" onchange="caricaGiocatoreSelezionato()">
            <option value="">Nuovo giocatore</option>
        </select>
    </div>
</div>

<div class="campi-statistiche">
    <div class="campo-statistica">
        <label for="parata">Parata:</label>
        <input type="number" id="parata" step="0.01">
    </div>

    <div class="campo-statistica">
        <label for="contrasto">Contrasto:</label>
        <input type="number" id="contrasto" step="0.01">
    </div>

    <div class="campo-statistica">
        <label for="passaggio">Passaggio:</label>
        <input type="number" id="passaggio" step="0.01">
    </div>

    <div class="campo-statistica">
        <label for="tiro">Tiro:</label>
        <input type="number" id="tiro" step="0.01">
    </div>

    <div class="campo-statistica">
        <label for="velocita">Velocita:</label>
        <input type="number" id="velocita" step="0.01">
    </div>

    <div class="campo-statistica">
        <label for="forza">Forza:</label>
        <input type="number" id="forza" step="0.01">
    </div>
</div>

<div class="azioni">
    <button onclick="calcola()">Calcola</button>
    <button class="secondario" onclick="salvaGiocatore()">Salva giocatore</button>
    <button class="secondario" onclick="nuovoGiocatore()">Nuovo giocatore</button>
    <button class="secondario" onclick="cancellaGiocatore()">Elimina giocatore</button>
    <span id="stato-salvataggio" aria-live="polite"></span>
</div>

<table id="tabella-risultati" hidden>
    <thead>
        <tr>
            <th>Ruolo</th>
            <th>Rating</th>
        </tr>
    </thead>
    <tbody id="risultati"></tbody>
</table>

<script src="script.js"></script>
<script>
/*
  Dynamic consent loader + fallback:
  - prova a caricare consent-banner.js/consent-banner.css (nomi non riconoscibili dagli adblocker)
  - se il file esterno non si carica entro timeout, inietta fallback inline (stile + logica)
*/
(function() {
  const SCRIPT_SRC = 'consent-banner.js';
  const CSS_HREF  = 'consent-banner.css';
  const FALLBACK_TIMEOUT_MS = 600;
  let scriptLoaded = false;

  // Try to load external JS
  const s = document.createElement('script');
  s.src = SCRIPT_SRC;
  s.async = true;
  s.onload = () => { scriptLoaded = true; };
  s.onerror = () => { scriptLoaded = false; };
  document.head.appendChild(s);

  // If external CSS link not present, append it (optional; adblockers may block it)
  if (!document.querySelector(`link[href="${CSS_HREF}"]`)) {
    const l = document.createElement('link');
    l.rel = 'stylesheet';
    l.href = CSS_HREF;
    document.head.appendChild(l);
  }

  // After timeout, if script not loaded, inject fallback inline
  setTimeout(() => {
    if (scriptLoaded) return;

    // Inject inline style only if not present
    if (!document.getElementById('consent-banner-inline-style')) {
      const style = document.createElement('style');
      style.id = 'consent-banner-inline-style';
      style.textContent = `
        #cookie-consent {
          position: fixed;
          left: 16px;
          right: 16px;
          bottom: 16px;
          background: rgba(17,17,17,0.95);
          color: #fff;
          padding: 12px 16px;
          border-radius: 8px;
          display: flex;
          gap: 12px;
          align-items: center;
          z-index: 9999;
          box-shadow: 0 6px 18px rgba(0,0,0,0.3);
          font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
          font-size: 14px;
        }
        #cookie-consent p { margin: 0; flex: 1; }
        #cookie-consent .cc-actions { display: flex; gap: 8px; }
        #cookie-consent button {
          background: #fff; color: #111; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer;
        }
        #cookie-consent button.secondary {
          background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.2);
        }
      `;
      document.head.appendChild(style);
    }

    // Inject inline logic fallback if banner not present
    if (!document.getElementById('cookie-consent')) {
      (function() {
        const STORAGE_KEY = 'mt11_cookie_consent_v1';

        function hasConsent() {
          return localStorage.getItem(STORAGE_KEY) === 'accepted';
        }
        function setConsent(value) {
          localStorage.setItem(STORAGE_KEY, value ? 'accepted' : 'rejected');
        }
        function removeBanner() {
          const el = document.getElementById('cookie-consent');
          if (el) el.remove();
        }
        function onAccept() {
          setConsent(true);
          removeBanner();
          // place for analytics injection after consent, if needed
        }
        function onReject() {
          setConsent(false);
          removeBanner();
        }

        if (!hasConsent()) {
          const container = document.createElement('div');
          container.id = 'cookie-consent';
          container.innerHTML = `
            <p>Usiamo cookie per migliorare l'esperienza e, con il tuo consenso, per analitica e pubblicità. Puoi accettare o rifiutare.</p>
            <div class="cc-actions">
              <button id="cc-accept">Accetta</button>
              <button id="cc-reject" class="secondary">Rifiuta</button>
            </div>
          `;
          document.body.appendChild(container);
          document.getElementById('cc-accept').addEventListener('click', onAccept);
          document.getElementById('cc-reject').addEventListener('click', onReject);
        }
      })();
    }
  }, FALLBACK_TIMEOUT_MS);
})();
</script>
</body>
</html>
